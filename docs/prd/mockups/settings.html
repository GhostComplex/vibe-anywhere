<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, 'SF Pro Display', sans-serif; -webkit-font-smoothing: antialiased; }
  .phone { width: 393px; height: 852px; background: #000; position: relative; overflow: hidden; }
  .status-bar { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; font-size: 15px; font-weight: 600; }
  .status-bar .time { font-size: 16px; font-weight: 700; }
  .large-title { font-size: 34px; font-weight: 700; padding: 8px 16px 16px; letter-spacing: -0.5px; }
  .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
  .settings-section { margin-bottom: 24px; }
  .settings-header { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px 6px; }
  .settings-group { overflow: hidden; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 16px; }
  .settings-value { font-size: 15px; font-family: 'SF Mono', monospace; color: rgba(255,255,255,0.35); }
  .status-connected { display: flex; align-items: center; gap: 6px; font-size: 14px; color: rgba(255,255,255,0.6); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.5); }
  .toggle { width: 51px; height: 31px; background: rgba(255,255,255,0.3); border-radius: 16px; position: relative; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 22px; width: 27px; height: 27px; background: #fff; border-radius: 50%; }
  .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: rgba(255,255,255,0.06); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: rgba(255,255,255,0.4); }
  .tab-item.active { color: #fff; }
  .tab-icon { font-size: 22px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">23:35</span><span>●●● ▁▃▅▇ 🔋</span></div>
  <div class="large-title">Settings</div>
  <div style="padding: 0 16px;">
    <div class="settings-section">
      <div class="settings-header">Connection</div>
      <div class="glass settings-group">
        <div class="settings-row"><span class="settings-label">Status</span><div class="status-connected"><span class="status-dot"></span> Connected</div></div>
        <div class="settings-row"><span class="settings-label">Host</span><span class="settings-value">192.168.1.42</span></div>
        <div class="settings-row"><span class="settings-label">Port</span><span class="settings-value">7842</span></div>
        <div class="settings-row"><span class="settings-label">Token</span><span class="settings-value">480ec2ba••••••</span></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-header">Agent</div>
      <div class="glass settings-group">
        <div class="settings-row"><span class="settings-label">Default Agent</span><span class="settings-value">claude ›</span></div>
        <div class="settings-row"><span class="settings-label">Permission Mode</span><span class="settings-value">prompt ›</span></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-header">General</div>
      <div class="glass settings-group">
        <div class="settings-row"><span class="settings-label">Haptic Feedback</span><div class="toggle"></div></div>
        <div class="settings-row"><span class="settings-label">About</span><span class="settings-value">v0.2.0 ›</span></div>
      </div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-item"><span class="tab-icon">💬</span>Chat</div>
    <div class="tab-item"><span class="tab-icon">📁</span>Sessions</div>
    <div class="tab-item active"><span class="tab-icon">⚙️</span>Settings</div>
  </div>
</div>
</body>
</html>
