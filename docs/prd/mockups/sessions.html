<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, 'SF Pro Display', sans-serif; -webkit-font-smoothing: antialiased; }
  .phone { width: 393px; height: 852px; background: #000; position: relative; overflow: hidden; }
  .status-bar { height: 54px; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 0; font-size: 15px; font-weight: 600; }
  .status-bar .time { font-size: 16px; font-weight: 700; }
  .nav-bar { height: 44px; display: flex; align-items: center; justify-content: flex-end; padding: 0 16px; }
  .nav-plus { font-size: 24px; color: #fff; font-weight: 300; }
  .large-title { font-size: 34px; font-weight: 700; padding: 0 16px 16px; letter-spacing: -0.5px; }
  .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(40px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
  .session-list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }
  .session-row { display: flex; align-items: center; padding: 14px 16px; gap: 14px; }
  .session-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .session-info { flex: 1; }
  .session-name { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
  .session-path { font-size: 13px; font-family: 'SF Mono', monospace; color: rgba(255,255,255,0.35); }
  .session-badge { display: inline-block; font-size: 11px; font-family: 'SF Mono', monospace; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 6px; margin-top: 4px; }
  .session-meta { text-align: right; }
  .session-time { font-size: 12px; color: rgba(255,255,255,0.3); }
  .session-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; margin-left: auto; margin-top: 6px; box-shadow: 0 0 6px rgba(255,255,255,0.4); }
  .tab-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: rgba(255,255,255,0.06); backdrop-filter: blur(40px); border-top: 1px solid rgba(255,255,255,0.08); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 8px; }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: rgba(255,255,255,0.4); }
  .tab-item.active { color: #fff; }
  .tab-icon { font-size: 22px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span class="time">23:35</span><span>●●● ▁▃▅▇ 🔋</span></div>
  <div class="nav-bar"><span class="nav-plus">+</span></div>
  <div class="large-title">Sessions</div>
  <div class="session-list">
    <div class="session-row glass">
      <div class="session-icon">📁</div>
      <div class="session-info">
        <div class="session-name">vibe-anywhere</div>
        <div class="session-path">~/projects/vibe-anywhere</div>
        <div class="session-badge">claude</div>
      </div>
      <div class="session-meta"><div class="session-time">2m ago</div><div class="session-dot"></div></div>
    </div>
    <div class="session-row glass">
      <div class="session-icon">📁</div>
      <div class="session-info">
        <div class="session-name">isotopes</div>
        <div class="session-path">~/projects/isotopes</div>
        <div class="session-badge">codex</div>
      </div>
      <div class="session-meta"><div class="session-time">1h ago</div></div>
    </div>
    <div class="session-row glass">
      <div class="session-icon">📁</div>
      <div class="session-info">
        <div class="session-name">website</div>
        <div class="session-path">~/projects/website</div>
        <div class="session-badge">claude</div>
      </div>
      <div class="session-meta"><div class="session-time">3h ago</div></div>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab-item"><span class="tab-icon">💬</span>Chat</div>
    <div class="tab-item active"><span class="tab-icon">📁</span>Sessions</div>
    <div class="tab-item"><span class="tab-icon">⚙️</span>Settings</div>
  </div>
</div>
</body>
</html>
