name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  daemon:
    name: Daemon — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: daemon/package-lock.json

      - name: Install dependencies
        working-directory: daemon
        run: npm ci

      - name: Type check
        working-directory: daemon
        run: npx tsc --noEmit

      - name: Build
        working-directory: daemon
        run: npm run build

      - name: Test
        working-directory: daemon
        run: npm test

  ios:
    name: iOS — Build & Test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: app
        run: |
          xcodebuild build \
            -project VibeAnywhere.xcodeproj \
            -scheme VibeAnywhere \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Test
        working-directory: app
        run: |
          xcodebuild test \
            -project VibeAnywhere.xcodeproj \
            -scheme VibeAnywhere \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGNING_ALLOWED=NO \
            | tail -40
